<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="nodeBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="nodePurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="nodeIndigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>

  <!-- Outer orbital ring -->
  <circle cx="50" cy="50" r="38" stroke="url(#ringGrad)" stroke-width="1" stroke-dasharray="4 6" opacity="0.4"/>

  <!-- Orbital arc 1 (top-right) -->
  <path d="M 18,32 A 36,36 0 0,1 82,32" stroke="url(#nodeBlue)" stroke-width="1" opacity="0.25" fill="none"/>

  <!-- Orbital arc 2 (bottom) -->
  <path d="M 82,68 A 36,36 0 0,1 18,68" stroke="url(#nodePurple)" stroke-width="1" opacity="0.25" fill="none"/>

  <!-- Hexagonal frame (platform) -->
  <polygon
    points="50,24 73,37 73,63 50,76 27,63 27,37"
    stroke="url(#coreGrad)"
    stroke-width="2.5"
    fill="none"
    stroke-linejoin="round"
    opacity="0.85"
  />

  <!-- Reactive energy lines - from vertices inward -->
  <line x1="50" y1="24" x2="50" y2="38" stroke="url(#nodeBlue)" stroke-width="1.5" opacity="0.6"/>
  <line x1="73" y1="63" x2="62" y2="58" stroke="url(#nodePurple)" stroke-width="1.5" opacity="0.6"/>
  <line x1="27" y1="63" x2="38" y2="58" stroke="url(#nodePurple)" stroke-width="1.5" opacity="0.6"/>

  <!-- Core diamond (reactor) -->
  <polygon
    points="50,34 62,50 50,66 38,50"
    fill="url(#coreGrad)"
    stroke="none"
  />

  <!-- Core center glow -->
  <circle cx="50" cy="50" r="3" fill="white" opacity="0.5"/>

  <!-- Node 1 - Top (blue) -->
  <circle cx="50" cy="16" r="4" fill="url(#nodeBlue)"/>
  <circle cx="50" cy="16" r="6" fill="url(#nodeBlue)" opacity="0.15"/>

  <!-- Node 2 - Bottom-right (purple) -->
  <circle cx="80" cy="66" r="4" fill="url(#nodePurple)"/>
  <circle cx="80" cy="66" r="6" fill="url(#nodePurple)" opacity="0.15"/>

  <!-- Node 3 - Bottom-left (indigo) -->
  <circle cx="20" cy="66" r="4" fill="url(#nodeIndigo)"/>
  <circle cx="20" cy="66" r="6" fill="url(#nodeIndigo)" opacity="0.15"/>
</svg>
