<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 100" fill="none">
  <defs>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="nodeBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="nodePurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="nodeIndigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
  </defs>

  <!-- Icon (positioned at left, same as bitreactor-icon.svg) -->
  <g transform="translate(0, 0)">
    <!-- Outer orbital ring -->
    <circle cx="50" cy="50" r="38" stroke="url(#ringGrad)" stroke-width="1" stroke-dasharray="4 6" opacity="0.35"/>

    <!-- Orbital arcs -->
    <path d="M 18,32 A 36,36 0 0,1 82,32" stroke="url(#nodeBlue)" stroke-width="1" opacity="0.2" fill="none"/>
    <path d="M 82,68 A 36,36 0 0,1 18,68" stroke="url(#nodePurple)" stroke-width="1" opacity="0.2" fill="none"/>

    <!-- Hexagonal frame -->
    <polygon
      points="50,24 73,37 73,63 50,76 27,63 27,37"
      stroke="url(#coreGrad)"
      stroke-width="2.5"
      fill="none"
      stroke-linejoin="round"
      opacity="0.85"
    />

    <!-- Reactive energy lines -->
    <line x1="50" y1="24" x2="50" y2="38" stroke="url(#nodeBlue)" stroke-width="1.5" opacity="0.6"/>
    <line x1="73" y1="63" x2="62" y2="58" stroke="url(#nodePurple)" stroke-width="1.5" opacity="0.6"/>
    <line x1="27" y1="63" x2="38" y2="58" stroke="url(#nodePurple)" stroke-width="1.5" opacity="0.6"/>

    <!-- Core diamond -->
    <polygon points="50,34 62,50 50,66 38,50" fill="url(#coreGrad)"/>

    <!-- Core center glow -->
    <circle cx="50" cy="50" r="3" fill="white" opacity="0.5"/>

    <!-- Nodes -->
    <circle cx="50" cy="16" r="4" fill="url(#nodeBlue)"/>
    <circle cx="50" cy="16" r="6" fill="url(#nodeBlue)" opacity="0.15"/>

    <circle cx="80" cy="66" r="4" fill="url(#nodePurple)"/>
    <circle cx="80" cy="66" r="6" fill="url(#nodePurple)" opacity="0.15"/>

    <circle cx="20" cy="66" r="4" fill="url(#nodeIndigo)"/>
    <circle cx="20" cy="66" r="6" fill="url(#nodeIndigo)" opacity="0.15"/>
  </g>

  <!-- Typography -->
  <g transform="translate(115, 0)">
    <!-- Bit -->
    <text
      x="0" y="0"
      font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif"
      font-size="42"
      font-weight="700"
      letter-spacing="-1"
      fill="#1E3A5F"
      dominant-baseline="central"
    >Bit</text>

    <!-- Reactor -->
    <text
      x="73" y="0"
      font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif"
      font-size="42"
      font-weight="300"
      letter-spacing="-0.5"
      fill="#7C3AED"
      dominant-baseline="central"
    >Reactor</text>

    <!-- Tagline -->
    <text
      x="0" y="30"
      font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif"
      font-size="12"
      font-weight="400"
      letter-spacing="2.5"
      fill="#94A3B8"
      dominant-baseline="central"
    >INFRASTRUCTURE PLATFORM</text>
  </g>
</svg>
