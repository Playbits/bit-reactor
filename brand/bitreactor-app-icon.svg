<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect x="6" y="6" width="108" height="108" rx="24" ry="24" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow overlay -->
  <rect x="6" y="6" width="108" height="108" rx="24" ry="24" fill="url(#glowGrad)"/>

  <!-- White icon symbol -->
  <g transform="translate(10, 10) scale(1, 1)">
    <!-- Outer orbital ring -->
    <circle cx="50" cy="50" r="36" stroke="white" stroke-width="1" stroke-dasharray="4 6" opacity="0.3"/>

    <!-- Hexagonal frame -->
    <polygon
      points="50,26 71,38 71,62 50,74 29,62 29,38"
      stroke="white"
      stroke-width="2"
      fill="none"
      stroke-linejoin="round"
      opacity="0.9"
    />

    <!-- Reactive energy lines -->
    <line x1="50" y1="26" x2="50" y2="39" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="71" y1="62" x2="61" y2="57" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="29" y1="62" x2="39" y2="57" stroke="white" stroke-width="1.5" opacity="0.7"/>

    <!-- Core diamond -->
    <polygon
      points="50,36 60,50 50,64 40,50"
      fill="white"
      opacity="0.95"
    />

    <!-- Core center accent -->
    <circle cx="50" cy="50" r="2.5" fill="url(#bgGrad)"/>

    <!-- Nodes -->
    <circle cx="50" cy="19" r="3.5" fill="white" opacity="0.95"/>
    <circle cx="50" cy="19" r="5.5" fill="white" opacity="0.12"/>

    <circle cx="78" cy="64" r="3.5" fill="white" opacity="0.95"/>
    <circle cx="78" cy="64" r="5.5" fill="white" opacity="0.12"/>

    <circle cx="22" cy="64" r="3.5" fill="white" opacity="0.95"/>
    <circle cx="22" cy="64" r="5.5" fill="white" opacity="0.12"/>
  </g>
</svg>
